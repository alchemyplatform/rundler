[profile.default]
src = 'src'
out = 'out'
libs = ['lib']
test = 'test'
cache_path = 'cache'
solc_version = '0.8.28+commit.7893614a'
optimizer = true
optimizer_runs = 1000000
evm_version = 'cancun'
via_ir = true

remappings = [
    '@account-abstraction=lib/account-abstraction/contracts/',
    '@openzeppelin=../v0_7/lib/openzeppelin-contracts/',
]

allow_paths = ["../v0_7/lib"]

# forge 1.4+ runs the solar linter during `forge build`; skip it so generating
# ABIs doesn't fail on third-party lib (e.g. OpenZeppelin) sources.
[lint]
lint_on_build = false
